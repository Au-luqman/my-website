<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>የእኔ መጀመሪያ ገጽ</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            color: #f1c40f;
        }
        /* ለበተኑ (Button) የተሰጠ ውበት */
        .my-button {
            display: inline-block;
            background-color: #e74c3c; /* ቀይ ቀለም */
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        /* ምስሉ እንዳይበላሽ የሚያደርግ */
        img {
            max-width: 80%;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>እንኳን ደህና መጡ!</h1>
    <p>ይህ በAcode የሰራሁት የመጀመሪያው ዌብሳይቴ ነው።</p>

    <br>
    <img src="profile-pic.jpg" alt="My Profile Picture" />
    <br><br>

    <a href="https://t.me/Telegram" target="_blank" class="my-button">ወደ እኔ ቴሌግራም ይግቡ</a>

</body>
</html>
