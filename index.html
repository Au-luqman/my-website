<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>አስ-ሰላሙ አለይኩም ወራህመቱሏሂ ወበረካቱህ</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            color: #f1c40f;
        }
        .my-button {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        img {
            max-width: 80%;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>እንኳን ደህና መጡ!</h1>
    <p>ይህ በAcode የሰራሁት የመጀመሪያው ዌብሳይት ነው።</p>
    
    <br>
    <img src="profile-pic.jpg" alt="የድረ-ገፁ አርማ">
    <br><br>

    <a href="https://t.me/bishoftumedrestutakwa" target="_blank" class="my-button">ወደ እኔ ቴሌግራም ይግቡ</a>

    <hr style="margin: 40px 0; border: 1px solid #34495e;">

    <div style="background-color: #34495e; max-width: 400px; margin: auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); text-align: left;">
        <h2 style="color: #f1c40f; text-align: center; margin-top: 0; font-size: 14pt;">የደራሶች አዲስ መመዝገቢያ ፎርም</h2>

        <form action="https://formspree.io/f/mzdqlrwz" method="POST">
            <label style="display: block; margin: 10px 0; color: white; font-size: 10pt;">የደረሳው ሙሉ ስም፦</label>
            <input type="text" name="student_name" placeholder="እባክዎ ስም ያስገቡ" required style="width: 100%; padding: 10px; border: none; border-radius: 4px; box-sizing: border-box;">

            <label style="display: block; margin: 10px 0; color: white; font-size: 10pt;">የሚከታተሉት የደርስ አይነት፦</label>
            <select name="course_type" style="width: 100%; padding: 10px; border: none; border-radius: 4px; background-color: white; box-sizing: border-box;">
                <option>ቁርአን (ሂፍዝ)</option>
                <option>ቃኢዳ ኑራንያ</option>
                <option>አቂዳ</option>
                <option>ፊቅህ</option>
                <option>ሀዲስ</option>
            </select>

            <label style="display: block; margin: 10px 0; color: white; font-size: 10pt;">የወላጅ ስልክ ቁጥር፦</label>
            <input type="tel" name="phone_number" placeholder="09..." required style="width: 100%; padding: 10px; border: none; border-radius: 4px; box-sizing: border-box;">

            <button type="submit" style="background-color: #e74c3c; color: white; border: none; padding: 12px; width: 100%; margin-top: 20px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 11pt;">ተማሪውን መዝግብ</button>
        </form>
    </div>
<hr style="margin: 40px 0; border: 1px solid #e74c3c;">

<div style="background-color: #34495e; max-width: 85%; margin: 20px auto; padding: 20px; border-radius: 10px; text-align: left;">
    <h2 style="color: #f1c40f; text-align: center;">የደረሶች አዲስ መመዝገቢያ ፎርም</h2>
    
    <form>
  <label style="display: block; margin-top: 15px; color: white;">የወላጅ ስልክ ቁጥር፦</label>
        <input type="text" placeholder="እባክዎ ስም ያስገቡ" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; box-sizing: border-box;">

        <label style="display: block; margin-top: 15px; color: white;">የሚከታተሉት የደርስ አይነት፦</label>
        <select style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; box-sizing: border-box;">
            <option>ቁርአን (ሂፍዝ)</option>
            <option>ቃኢዳ ኑራንያ</option>
            <option>አቂዳ</option>
            <option>ፊቅህ</option>
            <option>ሀዲስ</option>
        </select>

        <label style="display: block; margin-top: 15px; color: white;">የEarly (የወላጅ) ስልክ ቁጥር፦</label>
        <input type="tel" placeholder="09..." style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; box-sizing: border-box;">

        <button type="button" style="background-color: #e74c3c; color: white; border: none; padding: 12px 20px; margin-top: 20px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;">ተማሪውን መዝግብ</button>
    </form>
</div>
<div style="max-width: 90%; margin: 30px auto; background-color: #ffffff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow-x: auto;">
    <h3 style="color: #2c3e50; text-align: center; margin-bottom: 15px;">የዕለቱ የተማሪዎች መገኘት መቆጣጠሪያ (Attendance)</h3>
    
    <table style="width: 100%; border-collapse: collapse; text-align: left; font-family: sans-serif;">
        <thead>
            <tr style="background-color: #2c3e50; color: white;">
                <style> th { padding: 12px; border: 1px solid #ddd; } </style>
                <th>የተማሪው ስም</th>
                <th>የደርስ ክፍል</th>
                <th>መገኘት</th>
                <th>መቅረት</th>
            </tr>
        </thead>
        <tbody style="color: #333;">
            <style> td { padding: 10px; border: 1px solid #ddd; } </style>
            <tr>
                <td>አብዱላህ አህመድ</td>
                <td>ቁርአን (ሂፍዝ)</td>
                <td style="text-align: center;"><input type="radio" name="st1" checked> ✔️</td>
                <td style="text-align: center;"><input type="radio" name="st1"> ❌</td>
            </tr>
            <tr>
                <td>ኡስማን ኑሩ</td>
                <td>ፊቅህ</td>
                <td style="text-align: center;"><input type="radio" name="st2" checked> ✔️</td>
                <td style="text-align: center;"><input type="radio" name="st2"> ❌</td>
            </tr>
            <tr>
                <td>ፋጢማ ኡመር</td>
                <td>አቂዳ</td>
                <td style="text-align: center;"><input type="radio" name="st3" checked> ✔️</td>
                <td style="text-align: center;"><input type="radio" name="st3"> ❌</td>
            </tr>
        </tbody>
    </table>
    
    <button type="button" style="background-color: #27ae60; color: white; border: none; padding: 10px 20px; margin-top: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;">የዛሬውን መዝገብ ሴቭ አድርግ</button>
</div>

</body>
</html>
